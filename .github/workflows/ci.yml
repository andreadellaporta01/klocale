name: CI

on:
  push:
    branches: [ main ]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: Lint / JVM / JS / WasmJs tests + API check
        run: ./gradlew ktlintCheck jvmTest jsNodeTest wasmJsNodeTest apiCheck --stacktrace
      - name: Android tests (Robolectric)
        run: ./gradlew :klocale-core:testDebugUnitTest --tests "dev.klocale.AndroidGoldenTest" --stacktrace

  apple:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v4
      - name: iOS / macOS tests
        run: ./gradlew iosSimulatorArm64Test macosArm64Test --stacktrace
